{% extends 'base.html' %}
{% block title %}Journal{% endblock %}
{% block body %}
<h1 class="text-2xl font-bold">Journal Titles</h1>
<ul>
    {% for article in articles %}
        <li>
            <a href={{ url_for('main.journal_article', slug=article.meta.slug) }}>{{ article.meta.title }}</a>
        </li>
    {% endfor %}
</ul>
{% endblock %}
